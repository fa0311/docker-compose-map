name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: uv sync --locked --all-groups
      - run: uv run ruff check .
      - run: uv run pyright
      - run: uv run pytest
      - run: docker build -t docker-compose-map .
